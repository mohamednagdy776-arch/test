version: '3.8'

services:

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - tayyibt-network
    restart: unless-stopped

  admin:
    build:
      context: ./admin
      dockerfile: ../docker/admin/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:3000/api/v1
    ports:
      - "3001:3001"
    depends_on:
      - backend
    networks:
      - tayyibt-network
    restart: unless-stopped

  ai-service:
    build:
      context: ./ai-service
      dockerfile: ../docker/ai-service/Dockerfile
    ports:
      - "5000:5000"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    networks:
      - tayyibt-network
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-tayyibt}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - tayyibt-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-user} -d ${DB_NAME:-tayyibt}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - tayyibt-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  tayyibt-network:
    driver: bridge
