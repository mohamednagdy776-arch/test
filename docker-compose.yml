version: '3.8'

services:

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    ports:
      - "3003:3000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - tayyibt-network
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
      target: runner
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3003/api/v1
        NEXT_PUBLIC_WS_URL: http://localhost:3003
    ports:
      - "3002:3000"
    environment:
      - HOSTNAME=0.0.0.0
      - PORT=3000
      - NEXT_PUBLIC_API_URL=http://localhost:3003/api/v1
      - NEXT_PUBLIC_WS_URL=http://localhost:3003
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend
    networks:
      - tayyibt-network
    restart: unless-stopped

  admin:
    build:
      context: .
      dockerfile: docker/admin/Dockerfile
      target: runner
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3003/api/v1
    ports:
      - "3001:3001"
    environment:
      - HOSTNAME=0.0.0.0
      - PORT=3001
      - NEXT_PUBLIC_API_URL=http://localhost:3003/api/v1
    depends_on:
      - backend
    networks:
      - tayyibt-network
    restart: unless-stopped

  ai-service:
    build:
      context: .
      dockerfile: docker/ai-service/Dockerfile
    ports:
      - "5000:5000"
    env_file:
      - .env
      - ai-service/.env
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      - redis
    networks:
      - tayyibt-network
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    env_file: .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - tayyibt-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - tayyibt-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  tayyibt-network:
    driver: bridge