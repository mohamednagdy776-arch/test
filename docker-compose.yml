version: '3.8'

services:
  # Backend API service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://user:password@postgres:5432/jawazaty
    depends_on:
      - postgres
      - redis
    networks:
      - jawazaty-network

  # PostgreSQL Database
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: jawazaty
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - jawazaty-network

  # Redis Cache
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    networks:
      - jawazaty-network

  # AI Service
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
    depends_on:
      - backend
    networks:
      - jawazaty-network

volumes:
  postgres_data:

networks:
  jawazaty-network:
    driver: bridge
