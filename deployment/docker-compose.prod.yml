# =============================================================================
# TAYYIBT PRODUCTION DOCKER COMPOSE
# =============================================================================
# 
# This is the production-ready Docker Compose file for deploying Tayyibt
# on a Hostinger VPS. It includes all services required for the platform.
#
# ==== SERVICES ====
# - nginx (port 80, 443)     : Reverse proxy with SSL
# - backend (port 3000)      : NestJS API + WebSocket
# - admin (port 3001)        : Admin dashboard
# - web (port 3002)          : User-facing web app
# - ai-service (port 5000)   : FastAPI matching algorithm
# - postgres (port 5432)      : PostgreSQL database
# - redis (port 6379)        : Redis cache
#
# ==== USAGE ====
# 1. Set up environment variables (.env.production)
# 2. Configure SSL certificates
# 3. Run: docker compose -f docker-compose.prod.yml up --build -d
#
# =============================================================================

version: '3.8'

services:

  # -------------------------------------------------------------------------
  # NGINX Reverse Proxy with SSL
  # -------------------------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: tayyibt-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - backend
      - admin
      - web
    networks:
      - tayyibt-network
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  # -------------------------------------------------------------------------
  # Backend API (NestJS)
  # -------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: tayyibt-backend
    env_file: .env.production
    environment:
      - NODE_ENV=production
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - tayyibt-network
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # -------------------------------------------------------------------------
  # Admin Dashboard (Next.js)
  # -------------------------------------------------------------------------
  admin:
    build:
      context: ./admin
      dockerfile: ../docker/admin/Dockerfile
    container_name: tayyibt-admin
    env_file: .env.production
    args:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    expose:
      - "3001"
    depends_on:
      - backend
    networks:
      - tayyibt-network
    restart: always

  # -------------------------------------------------------------------------
  # Web Application (Next.js)
  # -------------------------------------------------------------------------
  web:
    build:
      context: ./web
      dockerfile: ../docker/web/Dockerfile
    container_name: tayyibt-web
    env_file: .env.production
    args:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL}
    expose:
      - "3002"
    depends_on:
      - backend
    networks:
      - tayyibt-network
    restart: always

  # -------------------------------------------------------------------------
  # AI Matching Service (FastAPI)
  # -------------------------------------------------------------------------
  ai-service:
    build:
      context: ./ai-service
      dockerfile: ../docker/ai-service/Dockerfile
    container_name: tayyibt-ai-service
    env_file: .env.production
    environment:
      - REDIS_URL=redis://:$${REDIS_PASSWORD}@redis:6379
    expose:
      - "5000"
    depends_on:
      - redis
    networks:
      - tayyibt-network
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # -------------------------------------------------------------------------
  # PostgreSQL Database
  # -------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: tayyibt-postgres
    env_file: .env.production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - tayyibt-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # -------------------------------------------------------------------------
  # Redis Cache
  # -------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: tayyibt-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    networks:
      - tayyibt-network
    restart: always

# -------------------------------------------------------------------------
# Docker Volumes (Persistent Data)
# -------------------------------------------------------------------------
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# -------------------------------------------------------------------------
# Docker Network
# -------------------------------------------------------------------------
networks:
  tayyibt-network:
    driver: bridge

# =============================================================================
# END OF DOCKER COMPOSE
# =============================================================================