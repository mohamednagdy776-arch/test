# coturn (TURN/STUN) server config for Tayyibt 1:1 WebRTC voice calls.
#
# Deployed NATIVELY (not docker) on the VPS at /etc/turnserver.conf, coturn v4.6.1.
# This file is the source-of-truth copy kept in the repo. To apply changes:
#   sudo cp deployment/coturn/turnserver.conf /etc/turnserver.conf
#   # then set the real secret (see static-auth-secret below) and restart:
#   sudo systemctl restart coturn
#
# The secret below is a PLACEHOLDER — never commit the real value. On the VPS it
# must equal the backend's TURN_SECRET (in /opt/tayyibt/.env.production) so the
# ephemeral REST-API credentials minted by GET /api/v1/calls/ice-servers validate.

listening-port=3478
fingerprint
use-auth-secret
static-auth-secret=__REPLACE_WITH_TURN_SECRET__
realm=145-14-158-100.sslip.io

# Public IP is directly on eth0 (no NAT mapping).
external-ip=145.14.158.100

# CRITICAL: pin listening + relay to the PUBLIC interface only. Without these,
# coturn discovers and round-robins relay allocations across every interface
# (docker0 / br-* bridges 172.16.x, IPv6), so ~4 of 5 relays land on an
# unroutable address and remote browsers' media never arrives → calls ring but
# never connect. Pinning makes every allocation use the reachable public IP.
listening-ip=145.14.158.100
relay-ip=145.14.158.100

# Relay media port range (must also be open at the host + provider firewall).
min-port=49152
max-port=65535

no-cli
no-tls
no-dtls
no-multicast-peers
stale-nonce=600

# Anti-SSRF: refuse to relay to private/loopback/link-local peer ranges.
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
