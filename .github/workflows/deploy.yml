name: Deploy to VPS

# Continuous deployment: every push to `main` ships the code to the VPS,
# rebuilds the Docker stack, and restarts it. Can also be run manually.
#
# This runs on a SELF-HOSTED runner installed on the VPS itself. The runner
# connects OUTBOUND to GitHub for jobs, so deployment no longer depends on
# GitHub being able to SSH INBOUND to port 22 (which the host firewall kept
# blocking). Deployment is therefore a local rsync + cd-deploy.sh — no SSH/SCP.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Never run two deploys at once.
concurrency:
  group: vps-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, vps]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject secrets into .env.production
        env:
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_EMAIL: ${{ secrets.VAPID_EMAIL }}
        run: |
          ENV_FILE="/opt/tayyibt/.env.production"
          # Create the file if it does not exist yet (first deploy)
          touch "$ENV_FILE"
          # Upsert each VAPID key: remove old line then append current value
          for KEY in VAPID_PUBLIC_KEY VAPID_PRIVATE_KEY VAPID_EMAIL; do
            VAL="${!KEY}"
            if [ -n "$VAL" ]; then
              sed -i "/^${KEY}=/d" "$ENV_FILE"
              echo "${KEY}=${VAL}" >> "$ENV_FILE"
            fi
          done

      - name: Deploy to /opt/tayyibt and rebuild
        run: |
          set -e
          mkdir -p /opt/tayyibt

          echo "==> Checkout state: $(git log --oneline -1)"
          echo "==> Migrations in workspace: $(ls backend/migrations/)"

          # Clean-mirror deploy: stage exactly the tracked paths we ship, then
          # rsync --delete into /opt/tayyibt so it is byte-for-byte the repo
          # EXCEPT the VPS-only state we must never touch (.env.production,
          # certs/). Staging keeps the mirror identical to the old archive-based
          # flow (untracked/dev files never leak in).
          rm -rf /tmp/deploy_stage && mkdir -p /tmp/deploy_stage
          cp -r backend web admin ai-service docker scripts \
                docker-compose.vps.yml docker-compose.prod.yml docker-compose.yml \
                .dockerignore README.md CLAUDE.md /tmp/deploy_stage/

          # Normalise any CRLF in shell scripts (Windows authoring backstop).
          find /tmp/deploy_stage/scripts -name '*.sh' -exec sed -i 's/\r$//' {} + 2>/dev/null || true

          command -v rsync >/dev/null 2>&1 || (apt-get update -qq && apt-get install -y -qq rsync)
          rsync -a --delete \
            --exclude='.env.production' \
            --exclude='.env' \
            --exclude='certs/' \
            --exclude='.git/' \
            /tmp/deploy_stage/ /opt/tayyibt/
          rm -rf /tmp/deploy_stage

          chmod +x /opt/tayyibt/scripts/cd-deploy.sh || true
          bash /opt/tayyibt/scripts/cd-deploy.sh

      - name: Public reachability check
        # cd-deploy.sh already gated health on localhost (authoritative). This
        # confirms the public endpoint too — and since the runner is ON the VPS,
        # this no longer depends on any external firewall.
        run: |
          code=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 10 \
            https://145-14-158-100.sslip.io/api/v1/health 2>/dev/null || echo 000)
          echo "Public endpoint: HTTP $code"
          test "$code" = "200"
