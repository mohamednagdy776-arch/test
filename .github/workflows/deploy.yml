name: Deploy to VPS

# Continuous deployment: every push to `main` ships the code to the VPS,
# rebuilds the Docker stack, and restarts it. Can also be run manually.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Never run two deploys at once.
concurrency:
  group: vps-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package the application
        run: |
          tar czf app.tar.gz \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='**/node_modules' \
            --exclude='.next' \
            --exclude='**/.next' \
            --exclude='dist' \
            --exclude='**/dist' \
            backend web admin ai-service docker scripts \
            docker-compose.vps.yml docker-compose.prod.yml docker-compose.yml \
            README.md CLAUDE.md

      - name: Upload package to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: app.tar.gz
          target: /tmp

      - name: Extract, build and restart on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          command_timeout: 40m
          script: |
            set -e
            mkdir -p /opt/tayyibt
            # Extract over the existing checkout. Untracked files NOT in the
            # archive (.env.production, certs/, Docker volumes) are preserved.
            tar xzf /tmp/app.tar.gz -C /opt/tayyibt
            rm -f /tmp/app.tar.gz
            chmod +x /opt/tayyibt/scripts/cd-deploy.sh || true
            bash /opt/tayyibt/scripts/cd-deploy.sh

      - name: Health check
        run: |
          sleep 5
          code=$(curl -s -o /dev/null -w '%{http_code}' https://145-14-158-100.sslip.io/api/v1/health || echo 000)
          echo "Backend health: $code"
          test "$code" = "200"
