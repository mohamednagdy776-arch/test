name: Auto-fix issues (Claude)

# Runs on a schedule on the self-hosted VPS runner. If there are open issues (and
# no auto-fix PR is already waiting for review), it runs Claude Code in headless
# auto mode to fix the safe ones, then opens a PR. Nothing deploys until a human
# merges that PR (merging main triggers the deploy workflow).
#
# SETUP: add a repo secret `ANTHROPIC_API_KEY` (Settings → Secrets and variables →
# Actions). Until it's set, the Claude step is skipped.
on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:        # plus a manual "Run workflow" button for testing

permissions:
  contents: write
  pull-requests: write
  issues: read

concurrency:
  group: auto-fix-issues
  cancel-in-progress: false

jobs:
  autofix:
    runs-on: [self-hosted, vps]
    env:
      BRANCH: auto-fix/run-${{ github.run_id }}
      REPO: ${{ github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Gate — open issues exist and no auto-fix PR is already open
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          node --input-type=module -e '
            const h = { Authorization: `Bearer ${process.env.GH_TOKEN}`, "User-Agent": "autofix", Accept: "application/vnd.github+json" };
            const fs = await import("node:fs");
            const issues = await (await fetch(`https://api.github.com/repos/${process.env.REPO}/issues?state=open&per_page=100`, { headers: h })).json();
            const open = (Array.isArray(issues) ? issues : []).filter(i => !i.pull_request);
            const prs = await (await fetch(`https://api.github.com/repos/${process.env.REPO}/pulls?state=open&per_page=100`, { headers: h })).json();
            const autopr = (Array.isArray(prs) ? prs : []).some(p => p.head?.ref?.startsWith("auto-fix/"));
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `count=${open.length}\nautopr=${autopr}\n`);
            fs.writeFileSync("open-issues.md", open.map(i => `### #${i.number} ${i.title}\n${(i.body || "").slice(0, 1500)}`).join("\n\n"));
            console.log(`open issues = ${open.length}; auto-fix PR already open = ${autopr}`);
          '

      - name: Install Claude Code
        if: ${{ steps.gate.outputs.count != '0' && steps.gate.outputs.autopr != 'true' }}
        run: npm install -g @anthropic-ai/claude-code

      - name: Claude auto-fix (headless, non-root)
        if: ${{ steps.gate.outputs.count != '0' && steps.gate.outputs.autopr != 'true' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::warning::ANTHROPIC_API_KEY secret is not set — skipping the fix step."
            exit 0
          fi
          # Claude Code refuses --dangerously-skip-permissions as root, and this
          # runner runs as root. Run it as the unprivileged `nobody` user: hand it
          # the workspace for the duration, then restore ownership for the git steps.
          chmod +x .github/run-claude.sh
          CLAUDE_DIR="$(dirname "$(command -v claude)")"
          chown -R nobody:nogroup .
          runuser -u nobody -- env \
            "PATH=$CLAUDE_DIR:/usr/local/bin:/usr/bin:/bin" \
            "HOME=/tmp" \
            "ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY" \
            bash .github/run-claude.sh || true
          chown -R root:root .

      - name: Open a PR with the changes
        if: ${{ steps.gate.outputs.count != '0' && steps.gate.outputs.autopr != 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          rm -f open-issues.md
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes were produced — nothing to open a PR for."
            exit 0
          fi
          git config user.name "claude-autofix[bot]"
          git config user.email "claude-autofix@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore(auto-fix): Claude auto-fix of open issues"
          git push origin "$BRANCH"
          node --input-type=module -e '
            const fs = await import("node:fs");
            const body = "Automated fixes for open issues by Claude Code (auto mode).\n\n" +
              "**Review before merging — merging to main deploys to the VPS.**\n\n" +
              (fs.existsSync("FIX_SUMMARY.md") ? fs.readFileSync("FIX_SUMMARY.md", "utf8") : "See the diff.");
            const r = await fetch(`https://api.github.com/repos/${process.env.REPO}/pulls`, {
              method: "POST",
              headers: { Authorization: `Bearer ${process.env.GH_TOKEN}`, "User-Agent": "autofix", Accept: "application/vnd.github+json", "Content-Type": "application/json" },
              body: JSON.stringify({ title: "Auto-fix: open issues", head: process.env.BRANCH, base: "main", body }),
            });
            const j = await r.json();
            console.log("PR status:", r.status, j.html_url || JSON.stringify(j).slice(0, 300));
          '
