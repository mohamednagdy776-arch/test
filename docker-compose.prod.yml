version: '3.8'

# Production compose — run with:
# docker-compose -f docker-compose.prod.yml up --build -d

services:

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro        # mount SSL certs here
    depends_on:
      - backend
      - admin
    networks:
      - tayyibt-network
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    env_file: .env.production
    environment:
      - NODE_ENV=production
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - tayyibt-network
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  admin:
    build:
      context: ./admin
      dockerfile: ../docker/admin/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    expose:
      - "3001"
    depends_on:
      - backend
    networks:
      - tayyibt-network
    restart: always

  web:
    build:
      context: ./web
      dockerfile: ../docker/web/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL}
    expose:
      - "3002"
    depends_on:
      - backend
    networks:
      - tayyibt-network
    restart: always

  ai-service:
    build:
      context: ./ai-service
      dockerfile: ../docker/ai-service/Dockerfile
    env_file: .env.production
    environment:
      - REDIS_URL=redis://redis:6379
    expose:
      - "5000"
    depends_on:
      - redis
    networks:
      - tayyibt-network
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  postgres:
    image: postgres:15-alpine
    env_file: .env.production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - tayyibt-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    networks:
      - tayyibt-network
    restart: always

volumes:
  postgres_data:
  redis_data:

networks:
  tayyibt-network:
    driver: bridge
